<!doctype html>
<html lang="en">
  <body style="margin: 0; padding: 0; background: #fffaf7; font-family: 'Plus Jakarta Sans', Arial, sans-serif; color: #2e2a2a;">
    <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background: #fffaf7; padding: 24px 0;">
      <tr>
        <td align="center">
          <table role="presentation" width="620" cellpadding="0" cellspacing="0" style="max-width: 620px; background: #ffffff; border: 1px solid #efd9d2; border-radius: 16px; overflow: hidden;">
            <tr>
              <td style="background: linear-gradient(135deg, #2f6f5c, #3a8a70); padding: 22px 24px; color: #ffffff;">
                <div style="font-size: 24px; font-weight: 700; letter-spacing: 0.2px;">MalZara</div>
                <div style="font-size: 14px; opacity: 0.92; margin-top: 6px;">{{ subject }}</div>
              </td>
            </tr>
            <tr>
              <td style="padding: 24px;">
                <p style="margin: 0 0 14px; font-size: 15px;">Hello {{ customer_name }},</p>
                
                <div style="margin: 0 0 18px; font-size: 15px; line-height: 1.6; white-space: pre-wrap;">{{ body }}</div>

                <table role="presentation" cellpadding="0" cellspacing="0" style="margin: 0 auto 8px;">
                  <tr>
                    <td align="center" style="border-radius: 10px; background: linear-gradient(135deg, #2f6f5c, #3a8a70);">
                      <a href="{{ app_base_url }}" style="display: inline-block; padding: 12px 20px; color: #ffffff; text-decoration: none; font-size: 14px; font-weight: 700;">
                        Shop MalZara
                      </a>
                    </td>
                  </tr>
                </table>

                <p style="margin: 14px 0 0; font-size: 12px; color: #8b7b76; text-align: center;">
                  MalZara Floral Boutique | {{ app_base_url }}
                </p>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
