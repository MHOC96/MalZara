{% extends 'base.html' %}
{% block title %}{{ title }} — MalZara{% endblock %}
{% block content %}
<div class="row justify-content-center mt-2">
  <div class="col-md-8 col-lg-6">
    <div class="card border-0 text-center no-hover">
      <div class="card-body p-5">
        <div class="empty-state__icon mb-3">✿</div>
        <h2 class="mb-2" style="font-family:var(--font-display)">{{ title }}</h2>
        <p class="text-muted mb-4">{{ message }}</p>
        <a href="{{ url_for('user.home_redirect') }}" class="btn btn-success">Return Home</a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
